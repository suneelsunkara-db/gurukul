command:
  - "uv"
  - "run"
  - "start-app"

env:
  - name: MLFLOW_TRACKING_URI
    value: "databricks"
  - name: ENDPOINT_NAME
    value: "projects/gurukul-lakebase/branches/production/endpoints/primary"
  - name: TEACHER_MODEL
    value: "databricks-gpt-5-5"
  - name: STUDENT_MODEL
    value: "databricks-claude-sonnet-4-6"
  - name: AGENT_CONCURRENCY
    value: "4"
  - name: TAVILY_API_KEY
    valueFrom: "tavily-api-key"
  - name: LOG_LEVEL
    value: "INFO"
