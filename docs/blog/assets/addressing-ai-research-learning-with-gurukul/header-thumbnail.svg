<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">From Curiosity to AI Research Direction: Building Gurukul</title>
  <desc id="desc">A professional blog header showing curiosity evolving into structured AI research direction through a knowledge graph, learning agents, and a paper scaffold.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07172f"/>
      <stop offset="0.55" stop-color="#0d2447"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.55">
      <stop offset="0" stop-color="#f4c95d" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#f4c95d" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#f4c95d"/>
    </marker>
    <style>
      .title { font: 800 54px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f8fafc; letter-spacing: -1.4px; }
      .accent { fill: #f4c95d; }
      .sub { font: 500 23px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #cbd5e1; }
      .node { fill: #102c55; stroke: #6aa5ff; stroke-width: 2; }
      .node-gold { fill: #3a2d12; stroke: #f4c95d; stroke-width: 2; }
      .line { stroke: #6aa5ff; stroke-width: 2; opacity: 0.78; }
      .flow { stroke: #f4c95d; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .card { fill: #0e203e; stroke: #476b9e; stroke-width: 2; }
      .label { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f8fafc; }
      .tiny { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #93a4bd; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <text class="title" x="78" y="98">From Curiosity to</text>
  <text class="title" x="78" y="162"><tspan class="accent">AI Research Direction</tspan></text>
  <text class="sub" x="82" y="206">Building Gurukul as a guided path for emerging AI research explorers</text>

  <g transform="translate(76 280)">
    <circle class="node-gold" cx="58" cy="82" r="34"/>
    <text class="label" x="35" y="89">?</text>
    <text class="tiny" x="12" y="138">Curiosity</text>
  </g>

  <g transform="translate(260 258)">
    <circle class="node" cx="50" cy="42" r="18"/>
    <circle class="node" cx="138" cy="78" r="22"/>
    <circle class="node" cx="80" cy="150" r="20"/>
    <circle class="node-gold" cx="185" cy="155" r="19"/>
    <circle class="node" cx="230" cy="63" r="17"/>
    <line class="line" x1="50" y1="42" x2="138" y2="78"/>
    <line class="line" x1="138" y1="78" x2="80" y2="150"/>
    <line class="line" x1="138" y1="78" x2="185" y2="155"/>
    <line class="line" x1="138" y1="78" x2="230" y2="63"/>
    <line class="line" x1="80" y1="150" x2="185" y2="155"/>
    <text class="tiny" x="54" y="210">Living knowledge graph</text>
  </g>

  <path class="flow" d="M170 360 C230 345 250 345 305 335"/>
  <path class="flow" d="M530 350 C595 345 620 345 680 345"/>

  <g transform="translate(675 255)">
    <rect class="card" x="0" y="0" width="290" height="210" rx="24"/>
    <circle class="node-gold" cx="62" cy="58" r="25"/>
    <circle class="node-gold" cx="62" cy="112" r="25"/>
    <circle class="node-gold" cx="62" cy="166" r="25"/>
    <text class="label" x="105" y="64">Teacher maps</text>
    <text class="label" x="105" y="118">Student explains</text>
    <text class="label" x="105" y="172">Examiner assesses</text>
  </g>

  <path class="flow" d="M970 360 C1018 360 1032 360 1076 360"/>

  <g transform="translate(1040 260)">
    <rect class="card" x="0" y="0" width="118" height="205" rx="14"/>
    <line x1="24" y1="44" x2="92" y2="44" stroke="#f4c95d" stroke-width="6" stroke-linecap="round"/>
    <line x1="24" y1="80" x2="92" y2="80" stroke="#6aa5ff" stroke-width="5" stroke-linecap="round"/>
    <line x1="24" y1="112" x2="78" y2="112" stroke="#6aa5ff" stroke-width="5" stroke-linecap="round"/>
    <line x1="24" y1="144" x2="92" y2="144" stroke="#f4c95d" stroke-width="5" stroke-linecap="round"/>
    <text class="tiny" x="-3" y="235">Research scaffold</text>
  </g>
</svg>
