<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Gurukul Lucid-style Architecture Diagram</title>
  <desc id="desc">Layered architecture showing frontend workspace, FastAPI orchestration, specialized agents, model serving, persistence, and grounding services.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#4f6f9f"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .zone { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; filter: url(#shadow); }
      .zone-title { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .node { fill: #f8fbff; stroke: #7aa2e3; stroke-width: 2; }
      .node-alt { fill: #fffaf0; stroke: #e0a933; stroke-width: 2; }
      .node-green { fill: #f0fdf4; stroke: #22a06b; stroke-width: 2; }
      .label { font: 600 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .sub { font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5f6b7a; }
      .arrow { stroke: #4f6f9f; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .muted-arrow { stroke: #94a3b8; stroke-width: 2.5; fill: none; marker-end: url(#arrow); stroke-dasharray: 8 7; }
      .badge { fill: #0f2a4d; }
      .badge-text { font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; letter-spacing: 0.03em; }
    </style>
  </defs>

  <rect class="bg" width="1400" height="820"/>

  <rect class="zone" x="60" y="70" width="300" height="640" rx="26"/>
  <text class="zone-title" x="90" y="115">Frontend Workspace</text>
  <rect class="node" x="95" y="155" width="230" height="74" rx="16"/>
  <text class="label" x="120" y="187">Topic Explorer</text>
  <text class="sub" x="120" y="210">Browse generated topics</text>
  <rect class="node" x="95" y="250" width="230" height="74" rx="16"/>
  <text class="label" x="120" y="282">Mind Map</text>
  <text class="sub" x="120" y="305">Visualize relationships</text>
  <rect class="node" x="95" y="345" width="230" height="74" rx="16"/>
  <text class="label" x="120" y="377">Eval Dashboard</text>
  <text class="sub" x="120" y="400">Inspect content quality</text>
  <rect class="node" x="95" y="440" width="230" height="74" rx="16"/>
  <text class="label" x="120" y="472">Challenge Panel</text>
  <text class="sub" x="120" y="495">MCQ and Socratic tests</text>
  <rect class="node" x="95" y="535" width="230" height="74" rx="16"/>
  <text class="label" x="120" y="567">Research Panel</text>
  <text class="sub" x="120" y="590">Directions and scaffold</text>

  <rect class="zone" x="430" y="130" width="300" height="520" rx="26"/>
  <text class="zone-title" x="465" y="175">Backend Orchestration</text>
  <rect class="node-alt" x="470" y="220" width="220" height="86" rx="16"/>
  <text class="label" x="500" y="254">FastAPI Routes</text>
  <text class="sub" x="500" y="278">REST APIs</text>
  <rect class="node-alt" x="470" y="340" width="220" height="86" rx="16"/>
  <text class="label" x="500" y="374">Agent Orchestration</text>
  <text class="sub" x="500" y="398">Long-running work</text>
  <rect class="node-alt" x="470" y="460" width="220" height="86" rx="16"/>
  <text class="label" x="500" y="494">SSE Broadcasts</text>
  <text class="sub" x="500" y="518">Progress to UI</text>

  <rect class="zone" x="800" y="70" width="250" height="640" rx="26"/>
  <text class="zone-title" x="835" y="115">Specialized Agents</text>
  <rect class="node-green" x="835" y="170" width="180" height="88" rx="18"/>
  <text class="label" x="880" y="205">Teacher</text>
  <text class="sub" x="865" y="230">Map and direction</text>
  <rect class="node-green" x="835" y="305" width="180" height="88" rx="18"/>
  <text class="label" x="880" y="340">Student</text>
  <text class="sub" x="866" y="365">Layered content</text>
  <rect class="node-green" x="835" y="440" width="180" height="88" rx="18"/>
  <text class="label" x="873" y="475">Examiner</text>
  <text class="sub" x="864" y="500">Assess learning</text>

  <rect class="zone" x="1120" y="95" width="230" height="590" rx="26"/>
  <text class="zone-title" x="1152" y="140">Data and Trust</text>
  <rect class="node" x="1150" y="185" width="170" height="76" rx="15"/>
  <text class="label" x="1184" y="217">Lakebase</text>
  <text class="sub" x="1175" y="240">Postgres state</text>
  <rect class="node" x="1150" y="295" width="170" height="76" rx="15"/>
  <text class="label" x="1172" y="327">Model Serving</text>
  <text class="sub" x="1178" y="350">Agent inference</text>
  <rect class="node" x="1150" y="405" width="170" height="76" rx="15"/>
  <text class="label" x="1194" y="437">arXiv</text>
  <text class="sub" x="1170" y="460">Reference checks</text>
  <rect class="node" x="1150" y="515" width="170" height="76" rx="15"/>
  <text class="label" x="1188" y="547">Search</text>
  <text class="sub" x="1175" y="570">Current context</text>

  <path class="arrow" d="M360 382 C390 382 400 382 430 382"/>
  <path class="arrow" d="M730 382 C760 382 770 382 800 382"/>
  <path class="arrow" d="M1015 214 C1070 214 1090 214 1150 223"/>
  <path class="arrow" d="M1015 349 C1070 349 1090 340 1150 333"/>
  <path class="arrow" d="M1015 484 C1070 484 1090 550 1150 553"/>
  <path class="arrow" d="M690 503 C735 575 820 635 925 635 C1010 635 1060 620 1150 592"/>
  <path class="muted-arrow" d="M470 503 C410 575 350 620 300 610"/>

  <rect class="badge" x="487" y="583" width="185" height="34" rx="17"/>
  <text class="badge-text" x="510" y="605">STREAMED PROGRESS</text>
  <rect class="badge" x="1163" y="626" width="143" height="34" rx="17"/>
  <text class="badge-text" x="1188" y="648">GROUNDED</text>

  <text class="sub" x="60" y="770">Lucid-style architecture view: workspace surfaces, orchestration boundary, agent responsibilities, and persistence/grounding services.</text>
</svg>
