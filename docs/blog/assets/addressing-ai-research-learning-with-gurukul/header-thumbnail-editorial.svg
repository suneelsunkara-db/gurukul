<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">From Curiosity to AI Research Direction: Building Gurukul</title>
  <desc id="desc">An editorial header image showing an emerging AI research explorer facing a dense research landscape, with a warm guided path through papers, graphs, models, and ideas.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#061327"/>
      <stop offset="0.58" stop-color="#0b2144"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>
    <linearGradient id="path" x1="0" y1="1" x2="0.82" y2="0">
      <stop offset="0" stop-color="#f8d36d" stop-opacity="0.95"/>
      <stop offset="0.55" stop-color="#f4b84d" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#ffe8a3" stop-opacity="0.18"/>
    </linearGradient>
    <radialGradient id="horizon" cx="0.72" cy="0.28" r="0.48">
      <stop offset="0" stop-color="#f8d36d" stop-opacity="0.36"/>
      <stop offset="0.45" stop-color="#2b6cb0" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#061327" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .paper { fill: #e8eef8; opacity: 0.15; stroke: #b9c7dd; stroke-width: 1.4; }
      .paper-strong { fill: #f8fafc; opacity: 0.28; stroke: #dbeafe; stroke-width: 1.4; }
      .line { stroke: #69a7ff; stroke-width: 1.4; opacity: 0.44; }
      .node { fill: #60a5fa; opacity: 0.82; }
      .node-gold { fill: #f8d36d; opacity: 0.92; }
      .equation { font: 600 15px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #c8d7ef; opacity: 0.46; }
      .label { font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f8fafc; opacity: 0.88; }
      .micro { font: 600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #dbeafe; opacity: 0.68; }
      .outline { fill: none; stroke: #f8d36d; stroke-width: 3; opacity: 0.55; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#sky)"/>
  <rect width="1200" height="630" fill="url(#horizon)"/>

  <g opacity="0.45">
    <path d="M0 455 C160 388 265 405 385 357 C525 300 636 320 766 264 C922 198 1032 218 1200 150 L1200 630 L0 630 Z" fill="#071a35"/>
    <path d="M0 500 C155 430 260 450 390 405 C545 352 685 362 845 300 C980 248 1072 245 1200 210 L1200 630 L0 630 Z" fill="#091f3d"/>
  </g>

  <g opacity="0.9">
    <path d="M515 630 C548 550 589 486 640 430 C699 365 754 322 816 270 C775 349 738 430 712 526 C701 567 692 600 687 630 Z" fill="url(#path)" filter="url(#softGlow)"/>
    <path d="M566 630 C612 539 669 466 742 405 C801 356 854 314 918 272" fill="none" stroke="#fff1b8" stroke-width="5" stroke-linecap="round" opacity="0.65"/>
  </g>

  <g transform="translate(190 363)">
    <ellipse cx="70" cy="205" rx="82" ry="20" fill="#020817" opacity="0.42"/>
    <path d="M68 33 C47 35 34 51 34 73 C34 96 49 113 70 113 C92 113 107 96 107 73 C107 50 91 31 68 33 Z" fill="#172033"/>
    <path d="M38 128 C53 111 85 108 103 128 C116 145 121 172 125 220 L23 220 C25 174 28 145 38 128 Z" fill="#101827"/>
    <path d="M32 166 C70 190 98 188 130 166" fill="none" stroke="#34445f" stroke-width="10" stroke-linecap="round"/>
    <circle cx="99" cy="50" r="5" fill="#f8d36d" opacity="0.75"/>
    <path d="M33 112 C58 128 84 128 108 112" fill="none" stroke="#f8d36d" stroke-width="3" opacity="0.32"/>
  </g>

  <g transform="translate(38 74)">
    <rect class="paper-strong" x="0" y="0" width="116" height="74" rx="8" transform="rotate(-8 58 37)"/>
    <rect class="paper" x="202" y="58" width="128" height="82" rx="8" transform="rotate(7 266 99)"/>
    <rect class="paper" x="84" y="190" width="136" height="88" rx="8" transform="rotate(5 152 234)"/>
    <rect class="paper" x="340" y="206" width="142" height="88" rx="8" transform="rotate(-7 411 250)"/>
    <text class="equation" x="18" y="44">attention(Q,K,V)</text>
    <text class="equation" x="224" y="106">loss -> signal</text>
    <text class="equation" x="112" y="242">graph of ideas</text>
    <text class="equation" x="365" y="258">eval gaps</text>
  </g>

  <g transform="translate(705 70)">
    <rect class="paper" x="34" y="22" width="120" height="78" rx="8" transform="rotate(9 94 61)"/>
    <rect class="paper-strong" x="196" y="78" width="142" height="88" rx="8" transform="rotate(-5 267 122)"/>
    <rect class="paper" x="382" y="8" width="124" height="82" rx="8" transform="rotate(6 444 49)"/>
    <rect class="paper" x="292" y="212" width="146" height="92" rx="8" transform="rotate(-3 365 258)"/>
    <text class="equation" x="56" y="69">model card</text>
    <text class="equation" x="222" y="129">related work</text>
    <text class="equation" x="404" y="56">arXiv</text>
    <text class="equation" x="318" y="266">review notes</text>
  </g>

  <g transform="translate(400 190)">
    <line class="line" x1="12" y1="54" x2="108" y2="24"/>
    <line class="line" x1="108" y1="24" x2="198" y2="72"/>
    <line class="line" x1="198" y1="72" x2="292" y2="38"/>
    <line class="line" x1="108" y1="24" x2="144" y2="142"/>
    <line class="line" x1="144" y1="142" x2="260" y2="160"/>
    <line class="line" x1="292" y1="38" x2="360" y2="118"/>
    <circle class="node" cx="12" cy="54" r="5"/>
    <circle class="node-gold" cx="108" cy="24" r="7"/>
    <circle class="node" cx="198" cy="72" r="5"/>
    <circle class="node" cx="292" cy="38" r="5"/>
    <circle class="node-gold" cx="144" cy="142" r="7"/>
    <circle class="node" cx="260" cy="160" r="5"/>
    <circle class="node-gold" cx="360" cy="118" r="7"/>
  </g>

  <g transform="translate(875 230)" opacity="0.82">
    <path class="outline" d="M38 0 L160 0 L160 180 L38 180 Z"/>
    <path class="outline" d="M62 38 L138 38"/>
    <path class="outline" d="M62 78 L130 78"/>
    <path class="outline" d="M62 118 L142 118"/>
    <path class="outline" d="M62 152 L118 152"/>
    <circle cx="38" cy="0" r="4" fill="#f8d36d"/>
    <circle cx="160" cy="180" r="4" fill="#f8d36d"/>
  </g>

  <g transform="translate(72 500)">
    <text class="label" x="0" y="0">From curiosity to research direction</text>
    <text class="micro" x="2" y="30">A guided path through fast-moving AI research ideas</text>
  </g>

  <g opacity="0.9">
    <circle class="node-gold" cx="636" cy="434" r="4" filter="url(#softGlow)"/>
    <circle class="node-gold" cx="690" cy="378" r="4" filter="url(#softGlow)"/>
    <circle class="node-gold" cx="758" cy="326" r="4" filter="url(#softGlow)"/>
    <circle class="node-gold" cx="826" cy="280" r="4" filter="url(#softGlow)"/>
  </g>
</svg>
